version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       service_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env.local
    depends_on:
      - db
      - redis
